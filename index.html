<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator Automático de Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7); /* Slate 800 w/ opacity */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #drop-zone.dragover {
            background-color: rgba(56, 189, 248, 0.1); /* Sky 400 w/ opacity */
            border-color: #38bdf8;
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Estilização customizada para os Radio Buttons */
        input[type="radio"] {
            accent-color: #38bdf8;
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8 font-sans">

    <div class="w-full max-w-3xl glass-panel rounded-2xl shadow-2xl p-6 sm:p-8 mt-4 sm:mt-10">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-sky-400 mb-2"><i class="fa-solid fa-robot mr-2"></i> Auto Extrator de Tickets</h1>
            <p class="text-slate-400 text-sm">Selecione o tipo, faça o upload do(s) print(s) e a IA organizará os dados.</p>
        </div>

        <!-- Seletor de Tipo de Ticket -->
        <div class="mb-6 flex flex-col sm:flex-row justify-center items-center gap-4 bg-slate-800/50 p-4 rounded-xl border border-slate-700">
            <span class="text-slate-300 font-semibold mr-2"><i class="fa-solid fa-filter mr-1"></i> Modo de Extração:</span>
            <label class="cursor-pointer flex items-center gap-2 hover:text-sky-400 transition-colors">
                <input type="radio" name="extractionType" value="cc" checked>
                <span class="font-medium">Ticket de CC (Padrão)</span>
            </label>
            <div class="hidden sm:block w-px h-6 bg-slate-600"></div>
            <label class="cursor-pointer flex items-center gap-2 hover:text-sky-400 transition-colors">
                <input type="radio" name="extractionType" value="ltc">
                <span class="font-medium">Pagamento LTC</span>
            </label>
        </div>

        <!-- Área de Upload -->
        <div id="drop-zone" class="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center transition-colors duration-200 hover:border-sky-400 hover:bg-slate-800/50">
            <input type="file" id="file-input" class="hidden" accept="image/png, image/jpeg, image/jpg" multiple>
            
            <div id="upload-content" class="cursor-pointer" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-cloud-arrow-up text-5xl text-slate-500 mb-4"></i>
                <p class="text-lg font-medium text-slate-300">Clique ou arraste prints aqui</p>
                <p class="text-sm text-slate-500 mt-1">Pode selecionar vários de uma vez</p>
            </div>

            <!-- Preview da Imagem -->
            <div id="image-preview-container" class="hidden flex flex-col items-center justify-center">
                <div id="image-grid" class="flex flex-wrap justify-center gap-4 mb-6 w-full max-h-64 overflow-y-auto p-2">
                    <!-- Thumbnails das imagens aparecerão aqui -->
                </div>
                <div class="flex gap-4">
                    <button type="button" class="bg-slate-700 hover:bg-slate-600 text-white text-sm py-2 px-4 rounded transition-colors" onclick="document.getElementById('file-input').click()">
                        <i class="fa-solid fa-plus mr-1"></i> Adicionar Mais
                    </button>
                    <button type="button" id="remove-image-btn" class="bg-red-900/50 hover:bg-red-800/50 text-red-300 text-sm py-2 px-4 rounded transition-colors">
                        <i class="fa-solid fa-trash mr-1"></i> Limpar Tudo
                    </button>
                </div>
            </div>
        </div>

        <!-- Ações -->
        <div class="mt-6 flex justify-center">
            <button id="extract-btn" class="hidden bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 px-8 rounded-lg shadow-lg transition-transform transform hover:scale-105 flex items-center">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> Extrair e Organizar Dados
            </button>
            <div id="loading-indicator" class="hidden flex items-center text-sky-400 font-medium py-3 px-8">
                <div class="loader mr-3"></div> Analisando imagem(ns) com IA...
            </div>
        </div>

        <!-- Área de Resultado -->
        <div id="result-container" class="hidden mt-8 opacity-0 transition-opacity duration-500">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg font-semibold text-slate-200"><i class="fa-solid fa-file-lines mr-2 text-slate-400"></i>Resultado Formatado</h3>
                <button id="copy-btn" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm py-1.5 px-4 rounded transition-colors flex items-center">
                    <i class="fa-regular fa-copy mr-2"></i> Copiar
                </button>
            </div>
            <textarea id="result-text" class="w-full h-64 bg-slate-900 border border-slate-700 rounded-lg p-4 text-slate-300 font-mono text-sm resize-none focus:outline-none focus:border-sky-500 transition-colors" readonly></textarea>
        </div>
    </div>

    <!-- Sistema de Notificação -->
    <div id="notification" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-emerald-500 text-white px-6 py-3 rounded-lg shadow-lg font-medium flex items-center z-50">
        <i class="fa-solid fa-check-circle mr-2"></i> <span id="notification-text">Copiado com sucesso!</span>
    </div>

    <script>
        // --- Configurações da API ---
        const apiKey = "AIzaSyDJ42x3OVzw9OI24adIxDmChLVsSXvNKaE"; // A chave é injetada no ambiente de execução
        
        // --- Elementos do DOM ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadContent = document.getElementById('upload-content');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imageGrid = document.getElementById('image-grid');
        const removeImageBtn = document.getElementById('remove-image-btn');
        const extractBtn = document.getElementById('extract-btn');
        const loadingIndicator = document.getElementById('loading-indicator');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        const copyBtn = document.getElementById('copy-btn');
        const notification = document.getElementById('notification');

        // Variável principal
        let uploadedImages = []; 

        // --- Lógica de Upload de Arquivo ---
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
        });

        removeImageBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            resetUI();
        });

        function handleFiles(files) {
            let addedNew = false;
            
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) {
                    showNotification('Por favor, envie apenas imagens (PNG, JPG).', 'bg-red-500');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const result = e.target.result;
                    const base64Image = result.split(',')[1];
                    
                    uploadedImages.push({
                        mimeType: file.type,
                        base64: base64Image,
                        src: result
                    });
                    
                    renderPreviews();
                };
                reader.readAsDataURL(file);
                addedNew = true;
            });

            if (addedNew) {
                uploadContent.classList.add('hidden');
                imagePreviewContainer.classList.remove('hidden');
                extractBtn.classList.remove('hidden');
                resultContainer.classList.add('hidden');
                resultContainer.classList.remove('opacity-100');
            }
        }

        window.removeSingleImage = function(index) {
            uploadedImages.splice(index, 1);
            if (uploadedImages.length === 0) {
                resetUI();
            } else {
                renderPreviews();
            }
        };

        function renderPreviews() {
            imageGrid.innerHTML = '';
            uploadedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'relative group';
                div.innerHTML = `
                    <img src="${img.src}" class="h-24 w-24 object-cover rounded-lg border border-slate-600 shadow-sm" alt="Print ${index + 1}">
                    <button onclick="window.removeSingleImage(${index})" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-md hover:bg-red-600">
                        <i class="fa-solid fa-times text-xs"></i>
                    </button>
                `;
                imageGrid.appendChild(div);
            });
        }

        function resetUI() {
            uploadedImages = [];
            fileInput.value = '';
            imageGrid.innerHTML = '';
            
            uploadContent.classList.remove('hidden');
            imagePreviewContainer.classList.add('hidden');
            extractBtn.classList.add('hidden');
            resultContainer.classList.add('hidden');
            resultContainer.classList.remove('opacity-100');
        }

        // --- Lógica de Extração via API (Gemini Vision) ---
        
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`HTTP error! status: ${response.status}, message: ${errText}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        extractBtn.addEventListener('click', async () => {
            if (uploadedImages.length === 0) return;

            // UI Loading state
            extractBtn.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            resultContainer.classList.remove('opacity-100');

            // Descobre qual modo o usuário selecionou (CC ou LTC)
            const extractionType = document.querySelector('input[name="extractionType"]:checked').value;
            let promptInstruction = "";

            if (extractionType === 'cc') {
                promptInstruction = `
Você é um extrator e organizador de dados especializado. 
Sua tarefa é ler a(s) imagem(ns) anexada(s) e extrair os dados para preencher ESTRITAMENTE o modelo fornecido abaixo.
As imagens podem conter partes de um mesmo ticket ou múltiplos tickets diferentes.
- Se os dados nas imagens se complementarem para o mesmo ticket, junte tudo em um único preenchimento.
- Se identificar múltiplos tickets independentes, preencha o modelo para CADA ticket, separando por uma linha em branco.

Regras importantes de mapeamento:
1. Onde diz 'Numero' na imagem, coloque no campo 'CC'.
2. Onde diz 'Level' na imagem, coloque no campo 'Nível'.
3. Onde diz 'Assunto' na imagem, coloque no campo 'Cliente diz'.
4. Se o ticket vier do Telegram (com User Telegram), coloque o nome do 'User'.
5. 'Cliente desde' pode ser inferido da data do 'Primeiro login' ou da data do pedido. Extraia apenas o Mês/Ano ou a data curta.
6. CÓDIGO DE FRAUDE (CRÍTICO ABSOLUTO PARA OCR): Este campo costuma conter um bloco de texto gigante com centenas de números separados por traços (ex: #2-8648-75999...), que ocupa MÚLTIPLAS LINHAS na tela. TRANSCREVA LITERALMENTE CADA CARACTERE. Junte todas as linhas desse código em UMA ÚNICA LINHA na sua resposta, sem espaços em branco. É expressamente proibido resumir, cortar, pular linhas ou usar reticências (...). Você deve extrair 100% da sequência numérica. Se na imagem houver um 'Lote', coloque o valor do Lote aqui em vez do código de fraude.
7. MANTENHA A LINHA "Cliente: Regular" EXATAMENTE COMO ESTÁ. Não a remova nem altere.
8. Se não encontrar uma informação (ex: Banco), deixe a linha vazia logo após os dois pontos (ex: 'Banco: ').

RETORNE APENAS OS TEXTOS PREENCHIDOS, SEM NENHUMA INTRODUÇÃO, CONCLUSÃO OU FORMATAÇÃO MARKDOWN (sem \`\`\`).

Modelo a ser preenchido:
Ticket: 
CC: 
Banco: 
Nível: 
User: 

Cliente diz: 

Cliente desde: 
Cliente: Regular

CÓDIGO DE FRAUDE: `;

            } else if (extractionType === 'ltc') {
                promptInstruction = `
Você é um extrator e organizador de dados especializado. 
Sua tarefa é ler a(s) imagem(ns) anexada(s) e extrair os dados de pagamentos via LTC para preencher ESTRITAMENTE o modelo fornecido abaixo.
As imagens podem conter partes de um mesmo ticket ou múltiplos tickets diferentes. Junte as informações de imagens diferentes que pertençam ao mesmo ticket. Se identificar múltiplos tickets independentes, preencha o modelo para CADA ticket.

Regras de mapeamento EXCLUSIVAS PARA LTC:
1. 'Ticket': Pegue o número do ticket (ex: 22370).
2. 'Telegram': Pegue o "User Telegram" e coloque um "@" no início, se já não tiver (ex: @Dico).
3. 'User': O nome de usuário do painel (ex: dicosynap).
4. 'Valor em Reais' e 'LTC': Preencha na mesma linha combinando os valores informados na imagem. Exemplo de saída: "R$ 48,00 ≈ 0,19939566 LTC".
5. 'Carteira': Endereço da Carteira LTC informado.
6. 'TXID': Transcreva LITERALMENTE todo o hash/Txid fornecido na imagem. É um código grande e não deve ser resumido.
7. Se faltar alguma informação na imagem, deixe o campo em branco logo após os dois pontos.

RETORNE APENAS OS TEXTOS PREENCHIDOS, SEM NENHUMA INTRODUÇÃO, CONCLUSÃO OU FORMATAÇÃO MARKDOWN (sem \`\`\`).

Modelo a ser preenchido:
Ticket: 
Telegram: 
User: 
Valor em Reais: R$ [valor em reais] ≈ [quantidade] LTC
Carteira: 

TXID: `;
            }

            // Adiciona a instrução e todas as imagens no payload
            const parts = [{ text: promptInstruction }];
            uploadedImages.forEach(img => {
                parts.push({
                    inlineData: { mimeType: img.mimeType, data: img.base64 }
                });
            });

            const payload = {
                contents: [{
                    role: "user",
                    parts: parts
                }]
            };

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            try {
                const result = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const extractedText = result.candidates?.[0]?.content?.parts?.[0]?.text;

                if (extractedText) {
                    // Limpar marcações de markdown residuais
                    let cleanText = extractedText.replace(/```text/g, '').replace(/```/g, '').trim();
                    
                    resultText.value = cleanText;
                    
                    // Show result
                    loadingIndicator.classList.add('hidden');
                    extractBtn.classList.remove('hidden');
                    resultContainer.classList.remove('hidden');
                    setTimeout(() => resultContainer.classList.add('opacity-100'), 50);
                } else {
                    throw new Error("Não foi possível extrair o texto da resposta da IA.");
                }

            } catch (error) {
                console.error("Erro na extração:", error);
                loadingIndicator.classList.add('hidden');
                extractBtn.classList.remove('hidden');
                showNotification('Erro ao analisar a imagem. Tente novamente.', 'bg-red-500');
            }
        });

        // --- Lógica de Cópia ---
        copyBtn.addEventListener('click', () => {
            resultText.select();
            resultText.setSelectionRange(0, 99999); // Para mobile

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showNotification('Texto copiado com sucesso!', 'bg-emerald-500');
                    
                    const originalHTML = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Copiado';
                    copyBtn.classList.add('bg-emerald-600', 'text-white');
                    copyBtn.classList.remove('bg-slate-700', 'text-slate-200');
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHTML;
                        copyBtn.classList.remove('bg-emerald-600', 'text-white');
                        copyBtn.classList.add('bg-slate-700', 'text-slate-200');
                    }, 2000);
                } else {
                    showNotification('Falha ao copiar texto.', 'bg-red-500');
                }
            } catch (err) {
                showNotification('Erro ao copiar. Tente selecionar e copiar manualmente.', 'bg-red-500');
            }
            
            window.getSelection().removeAllRanges();
        });

        // --- Notificações ---
        let notificationTimeout;
        function showNotification(message, colorClass) {
            const icon = colorClass.includes('emerald') ? 'fa-check-circle' : 'fa-circle-exclamation';
            const notificationText = document.getElementById('notification-text');
            
            notification.className = `fixed bottom-5 right-5 transform transition-all duration-300 px-6 py-3 rounded-lg shadow-lg font-medium flex items-center z-50 ${colorClass}`;
            notificationText.innerHTML = message;
            
            // Mostrar
            notification.classList.remove('translate-y-20', 'opacity-0');
            
            // Esconder depois de 3 segundos
            clearTimeout(notificationTimeout);
            notificationTimeout = setTimeout(() => {
                notification.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

    </script>
</body>
</html>
